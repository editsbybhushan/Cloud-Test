<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - CloudClear</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    background: #f1f5f9;
}

/* SIDEBAR */
.sidebar {
    width: 230px;
    height: 100vh;
    background: #0b1220;
    color: white;
    padding: 20px;
    position: fixed;
}

.sidebar h2 {
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    text-decoration: none;
    padding: 10px;
    border-radius: 5px;
    margin-bottom: 10px;
}

.sidebar a:hover {
    background: #1e293b;
    color: white;
}

/* MAIN */
.main {
    margin-left: 230px;
    width: calc(100% - 230px);
}

/* TOPBAR */
.topbar {
    background: white;
    padding: 15px 25px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

/* CONTENT */
.content {
    padding: 30px;
}

/* SETTINGS BOX */
.settings-box {
    background: white;
    padding: 25px;
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: 0 0 10px rgba(0,0,0,0.05);
}

.settings-box h3 {
    margin-bottom: 15px;
}

.settings-box input {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border: 1px solid #ddd;
    border-radius: 5px;
}

.settings-box button {
    padding: 10px 18px;
    border: none;
    background: #5b6cff;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.settings-box button:hover {
    background: #4a58e0;
}

/* TOGGLE SWITCH */
.toggle {
    display: flex;
    align-items: center;
    gap: 10px;
}

.toggle input {
    width: 40px;
    height: 20px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>CloudClear</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="upload.html">Upload Image</a>
    <a href="processing.html">Processing</a>
    <a href="result.html">Results</a>
    <a href="compare.html">Compare</a>
    <a href="history.html">History</a>
    <a href="tools.html">Tools</a>
    <a href="#">Settings</a>
    <a href="index.html">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <h3>Settings</h3>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <!-- PROFILE SETTINGS -->
        <div class="settings-box">
            <h3>Profile Settings</h3>
            <input type="text" placeholder="Full Name">
            <input type="email" placeholder="Email Address">
            <button>Save Changes</button>
        </div>

        <!-- PASSWORD -->
        <div class="settings-box">
            <h3>Change Password</h3>
            <input type="password" placeholder="Current Password">
            <input type="password" placeholder="New Password">
            <input type="password" placeholder="Confirm Password">
            <button>Update Password</button>
        </div>

        <!-- THEME -->
        <div class="settings-box">
            <h3>Appearance</h3>
            <div class="toggle">
                <label>Dark Mode</label>
                <input type="checkbox">
            </div>
        </div>

    </div>

</div>

</body>
</html>
