<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}

body{
  display:flex;
  background:#f1f5f9;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#0b1220;
  color:white;
  height:100vh;
  padding:20px;
}

.sidebar h2{
  margin-bottom:30px;
}

.sidebar a{
  display:block;
  padding:12px;
  color:#cbd5e1;
  text-decoration:none;
  border-radius:8px;
  margin-bottom:10px;
}

.sidebar a:hover{
  background:#1e293b;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
}

.card h4{
  color:#64748b;
  margin-bottom:10px;
}

.card p{
  font-size:22px;
  font-weight:bold;
}

/* SECTION */
.section{
  margin-top:20px;
}

.section h3{
  margin-bottom:10px;
}

.images{
  display:flex;
  gap:10px;
}

.images img{
  width:120px;
  height:80px;
  border-radius:8px;
  object-fit:cover;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>CloudClear</h2>

  <a href="#">Dashboard</a>
  <a href="upload.html">Upload Image</a>
  <a href="my-images.html">My Images</a>
  <a href="history.html">History</a>
  <a href="compare.html">Compare</a>
  <a href="tools.html">Tools</a>
  <a href="settings.html">Settings</a>
  <a href="index.html">Logout</a>
  
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h2>Dashboard</h2>
    <div>User</div>
  </div>

  <!-- STATS -->
  <div class="stats">

    <div class="card">
      <h4>Total Uploads</h4>
      <p id="uploads">0</p>
    </div>

    <div class="card">
      <h4>Processed Images</h4>
      <p id="processed">0</p>
    </div>

    <div class="card">
      <h4>Cloud Removed</h4>
      <p><span id="cloud">0</span>%</p>
    </div>

    <div class="card">
      <h4>Storage Used</h4>
      <p id="storage">0 GB</p>
    </div>

  </div>

  <!-- RECENT UPLOADS -->
  <div class="section">
    <h3>Recent Uploads</h3>

    <div class="images">
      <img src="https://via.placeholder.com/150">
      <img src="https://via.placeholder.com/150">
      <img src="https://via.placeholder.com/150">
      <img src="https://via.placeholder.com/150">
    </div>
  </div>

  <!-- RECENT RESULTS -->
  <div class="section">
    <h3>Recent Results</h3>

    <div class="images">
      <img src="https://via.placeholder.com/150">
      <img src="https://via.placeholder.com/150">
      <img src="https://via.placeholder.com/150">
      <img src="https://via.placeholder.com/150">
    </div>
  </div>

</div>

<script>
// DYNAMIC DATA

let uploads = localStorage.getItem("uploads") || 0;
let processed = localStorage.getItem("processed") || 0;
let cloud = localStorage.getItem("cloud") || 0;

document.getElementById("uploads").innerText = uploads;
document.getElementById("processed").innerText = processed;
document.getElementById("cloud").innerText = cloud;

// STORAGE CALCULATION (FAKE FOR NOW)
let storage = (uploads * 0.2).toFixed(1);
document.getElementById("storage").innerText = storage + " GB";
</script>

</body>
</html>
