<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results - CloudClear</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    background: #f1f5f9;
}

/* SIDEBAR */
.sidebar {
    width: 230px;
    height: 100vh;
    background: #0b1220;
    color: white;
    padding: 20px;
    position: fixed;
}

.sidebar h2 {
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    text-decoration: none;
    padding: 10px;
    border-radius: 5px;
    margin-bottom: 10px;
}

.sidebar a:hover {
    background: #1e293b;
    color: white;
}

/* MAIN */
.main {
    margin-left: 230px;
    width: calc(100% - 230px);
}

/* TOPBAR */
.topbar {
    background: white;
    padding: 15px 25px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

/* CONTENT */
.content {
    padding: 30px;
}

/* IMAGE SECTION */
.images {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.image-box {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 10px rgba(0,0,0,0.05);
}

.image-box img {
    max-width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

/* BUTTONS */
.buttons {
    text-align: center;
}

.btn {
    padding: 10px 15px;
    margin: 10px;
    border: none;
    background: #5b6cff;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.btn:hover {
    background: #4a58e0;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>CloudClear</h2>
  <a href="#">Dashboard</a>
  <a href="upload.html">Upload Image</a>
  <a href="my-images.html">My Images</a>
  <a href="history.html">History</a>
  <a href="compare.html">Compare</a>
  <a href="tools.html">Tools</a>
  <a href="settings.html">Settings</a>
  <a href="index.html">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <h3>Processing Results</h3>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <!-- IMAGE DISPLAY -->
        <div class="images">

            <div class="image-box">
                <h3>Original Image</h3>
                <img src="https://via.placeholder.com/400x300?text=Original+Image" id="originalImage">
            </div>

            <div class="image-box">
                <h3>Processed Image</h3>
                <img src="https://via.placeholder.com/400x300?text=Processed+Image" id="processedImage">
            </div>

        </div>

        <!-- BUTTONS -->
        <div class="buttons">
            <button class="btn" onclick="downloadImage()">Download Result</button>
            <a href="compare.html">
                <button class="btn">Compare</button>
            </a>
            <a href="upload.html">
                <button class="btn">Process Another</button>
            </a>
        </div>

    </div>

</div>

<script>
function downloadImage() {
    const link = document.createElement('a');
    link.href = document.getElementById("processedImage").src;
    link.download = "processed_image.png";
    link.click();
}
</script>

</body>
</html>
